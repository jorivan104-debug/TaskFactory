# Despliegue en Dokploy como UNA aplicación tipo "Docker Compose" (recomendado).
# Así `web` y `api` comparten red y el proxy interno resuelve siempre `api:3000`.
#
# En Dokploy: nueva aplicación → Docker Compose → raíz del repo → este archivo.
# Variables en el panel (ejemplos): DATABASE_URL, JWT_SECRET, JWT_EXPIRATION.
#
# Si Postgres está en OTRO stack de Dokploy, debe existir una red compartida entre
# stacks o usar DATABASE_URL con un host alcanzable desde este compose.

services:
  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      PORT: "3000"
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/api/auth/setup-status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HOST_WEB_PORT:-80}:80"
    environment:
      BACKEND_UPSTREAM: api:3000
