# Compose alternativo: API + frontend SIN Postgres en el mismo stack.
# Para el despliegue habitual (Postgres incluido) use docker-compose.yml — ver docs/006-dokploy-deployment.md.
#
# En Dokploy: Compose path → ./docker-compose.dokploy.yml
# Variables obligatorias: DATABASE_URL, JWT_SECRET
# Red: todos los servicios en dokploy-network; dominio público → servicio web, puerto 80.

services:
  api:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      PORT: "3000"
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/api/auth/setup-status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80"
    environment:
      BACKEND_UPSTREAM: api:3000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.taskfactory-web.rule=Host(`${TASKFACTORY_HOST:-taskfactory.app-sprint.com}`)
      - traefik.http.routers.taskfactory-web.entrypoints=web
      - traefik.http.routers.taskfactory-web.service=taskfactory-web
      - traefik.http.routers.taskfactory-web-secure.rule=Host(`${TASKFACTORY_HOST:-taskfactory.app-sprint.com}`)
      - traefik.http.routers.taskfactory-web-secure.entrypoints=websecure
      - traefik.http.routers.taskfactory-web-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.taskfactory-web-secure.service=taskfactory-web
      - traefik.http.services.taskfactory-web.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true
