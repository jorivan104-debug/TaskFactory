# Compose principal para Dokploy con Postgres interno en la misma red del stack.
# Evita problemas de conectividad DNS entre servicios separados.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: taskfactory-db
    volumes:
      - taskfactory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskfactory-db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/taskfactory-db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      PORT: "3000"
      # WorkOS AuthKit (dejelas vacias para deshabilitar el boton)
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/api/auth/setup-status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_UPSTREAM: backend:3000
    ports:
      - "${HOST_WEB_PORT:-80}:80"

volumes:
  taskfactory_pgdata: