# Compose principal para Dokploy (postgres + backend + frontend).
# Documentación: docs/006-dokploy-deployment.md
#
# Dominio público → servicio frontend:80 (labels Traefik abajo o pestaña Domains, no ambos).
# Todos los servicios en dokploy-network. Variables: POSTGRES_PASSWORD, JWT_SECRET,
# FRONTEND_URL, TASKFACTORY_HOST.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: taskfactory-db
    volumes:
      - taskfactory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskfactory-db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/taskfactory-db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      PORT: "3000"
      # WorkOS AuthKit (dejelas vacias para deshabilitar el boton)
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/api/auth/setup-status >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_UPSTREAM: backend:3000
    ports:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.taskfactory-web.rule=Host(`${TASKFACTORY_HOST:-taskfactory.app-sprint.com}`)
      - traefik.http.routers.taskfactory-web.entrypoints=web
      - traefik.http.routers.taskfactory-web.service=taskfactory-web
      - traefik.http.routers.taskfactory-web-secure.rule=Host(`${TASKFACTORY_HOST:-taskfactory.app-sprint.com}`)
      - traefik.http.routers.taskfactory-web-secure.entrypoints=websecure
      - traefik.http.routers.taskfactory-web-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.taskfactory-web-secure.service=taskfactory-web
      - traefik.http.services.taskfactory-web.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true

volumes:
  taskfactory_pgdata: